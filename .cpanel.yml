---
deployment:
  tasks:
    - export DEPLOYPATH=/home/goodsmux/staging.goodnrowdy.com
    - /usr/bin/rsync -aq --exclude='.git/' --exclude='node_modules/' --exclude='.next/' . $DEPLOYPATH
    - export HOME=/home/goodsmux
    - cd $DEPLOYPATH && /home/goodsmux/nodevenv/staging.goodnrowdy.com/20/bin/npm install --omit=dev
    - cd $DEPLOYPATH && /home/goodsmux/nodevenv/staging.goodnrowdy.com/20/bin/npm run build
